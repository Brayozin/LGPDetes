<head>

    <title>LGPDetes Proxy API - API Documentation</title>
    <style>
        body { margin: 0; padding: 0; }
        #opencollection-container { width: 100vw; height: 100vh; }

<body>
    <div id="opencollection-container"></div>
    <script>
        const collectionData = "opencollection: 1.0.0\ninfo:\n  name: LGPDetes Proxy API\nconfig:\n  environments:\n    - name: local\n      variables:\n        - name: baseUrl\n          value: http://localhost:3000\n        - name: userEmail\n          value: joao.silva@northmail.com\n        - name: userPassword\n          value: DemoUser!23\n        - name: registerFullName\n          value: BrunoTester\n        - name: registerEmail\n          value: bruno.tester@example.com\n        - name: registerPassword\n          value: DemoUser!23\n        - name: registerAge\n          value: '22'\n        - name: adminEmail\n          value: admin@lgpdetesproxy.com\n        - name: adminPassword\n          value: DemoAdmin!23\n        - name: platformId\n          value: plt_nightwave\n        - name: providerId\n          value: prv_gov\n        - name: clientSessionId\n          value: cls_night_001\n        - name: verificationId\n          value: ver_001\n        - name: proofToken\n          value: agtok_demo_seed001\n        - name: connectionId\n          value: conn_001\n        - name: platformStatus\n          value: pilot\nitems:\n  - info:\n      name: Auth\n      type: folder\n      seq: 1\n    docs:\n      content: |-\n        Rotas de autentica\xE7\xE3o para usu\xE1rio final e admin.\n\n        Use `User Login` antes das rotas em `user/*`.\n        Use `Admin Login` antes das rotas em `admin/*`.\n\n        O Bruno mant\xE9m o cookie de sess\xE3o entre requests, ent\xE3o n\xE3o \xE9 necess\xE1rio copiar token manualmente.\n      type: text/markdown\n    items:\n      - info:\n          name: User Login\n          type: http\n          seq: 1\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/auth/login'\n          body:\n            type: json\n            data: |-\n              {\n                \"email\": \"{{userEmail}}\",\n                \"password\": \"{{userPassword}}\"\n              }\n        runtime:\n          assertions:\n            - expression: $res.status\n              operator: '200'\n              value: ''\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Cria a sess\xE3o do usu\xE1rio final.\n\n          Credenciais seed padr\xE3o:\n          - `{{userEmail}}`\n          - `{{userPassword}}`\n      - info:\n          name: User Register\n          type: http\n          seq: 2\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/auth/register'\n          body:\n            type: json\n            data: |-\n              {\n                \"fullName\": \"{{registerFullName}}\",\n                \"email\": \"{{registerEmail}}\",\n                \"password\": \"{{registerPassword}}\",\n                \"age\": {{registerAge}}\n              }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n      - info:\n          name: User Logout\n          type: http\n          seq: 3\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/auth/logout'\n        settings:\n          encodeUrl: false\n          timeout: 0\n          followRedirects: false\n          maxRedirects: 5\n      - info:\n          name: Admin Login\n          type: http\n          seq: 4\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/admin/login'\n          body:\n            type: json\n            data: |-\n              {\n                \"email\": \"{{adminEmail}}\",\n                \"password\": \"{{adminPassword}}\"\n              }\n        runtime:\n          assertions:\n            - expression: $res.status\n              operator: '200'\n              value: ''\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Cria a sess\xE3o administrativa.\n\n          Credenciais seed padr\xE3o:\n          - `{{adminEmail}}`\n          - `{{adminPassword}}`\n      - info:\n          name: Admin Logout\n          type: http\n          seq: 5\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/admin/logout'\n        settings:\n          encodeUrl: false\n          timeout: 0\n          followRedirects: false\n          maxRedirects: 5\n  - info:\n      name: Admin\n      type: folder\n      seq: 5\n    docs:\n      content: |-\n        Rotas administrativas para dashboard, plataformas, provedores, usu\xE1rios e auditoria.\n\n        Antes de usar esta pasta:\n        1. rode `auth/Admin Login`\n      type: text/markdown\n    items:\n      - info:\n          name: Get Dashboard\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/admin/dashboard'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n      - info:\n          name: List Platforms\n          type: http\n          seq: 2\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/admin/platforms'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n      - info:\n          name: Update Platform Status\n          type: http\n          seq: 3\n        http:\n          method: PATCH\n          url: '{{baseUrl}}/api/admin/platforms/{{platformId}}/status'\n          body:\n            type: json\n            data: |-\n              {\n                \"status\": \"{{platformStatus}}\"\n              }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n      - info:\n          name: List Providers\n          type: http\n          seq: 4\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/admin/providers'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n      - info:\n          name: Create Provider\n          type: http\n          seq: 5\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/admin/providers'\n          body:\n            type: json\n            data: |-\n              {\n                \"name\": \"Bruno Gmail Mirror\",\n                \"key\": \"gmail\",\n                \"type\": \"email_identity\",\n                \"status\": \"active\",\n                \"domainHint\": \"gmail.mirror.local\",\n                \"scopes\": [\n                  \"email_verified\",\n                  \"age_signal_18_plus\"\n                ]\n              }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n      - info:\n          name: List Users\n          type: http\n          seq: 6\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/admin/users'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n      - info:\n          name: List Logs\n          type: http\n          seq: 7\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/admin/logs'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n  - info:\n      name: Client\n      type: folder\n      seq: 2\n    docs:\n      content: |-\n        Rotas que simulam a integra\xE7\xE3o do aplicativo externo com o proxy.\n\n        Fluxo t\xEDpico:\n        1. `Request Age Check`\n        2. aguarde o usu\xE1rio concluir a verifica\xE7\xE3o\n        3. `Session Status`\n        4. `Exchange Proof`\n      type: text/markdown\n    items:\n      - info:\n          name: Request Age Check\n          type: http\n          seq: 1\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/client/request-age-check'\n          body:\n            type: json\n            data: |-\n              {\n                \"platformId\": \"{{platformId}}\"\n              }\n        runtime:\n          assertions:\n            - expression: $res.status\n              operator: '200'\n              value: ''\n          actions:\n            - type: set-variable\n              phase: after-response\n              selector:\n                expression: $res.body.session.id\n                method: jsonq\n              variable:\n                name: clientSessionId\n                scope: runtime\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Inicia uma sess\xE3o de age check para o app externo.\n\n          Atualiza automaticamente `clientSessionId` com `session.id` da resposta.\n      - info:\n          name: Session Status\n          type: http\n          seq: 2\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/client/session-status'\n          params:\n            - name: sessionId\n              value: '{{clientSessionId}}'\n              type: query\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n      - info:\n          name: Exchange Proof\n          type: http\n          seq: 3\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/client/exchange-proof'\n          body:\n            type: json\n            data: |-\n              {\n                \"sessionId\": \"{{clientSessionId}}\",\n                \"proofToken\": \"{{proofToken}}\"\n              }\n        runtime:\n          assertions:\n            - expression: $res.status\n              operator: '200'\n              value: ''\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Troca o proof token pela resposta consum\xEDvel pelo aplicativo externo.\n\n          Este request depende de `clientSessionId` e `proofToken` j\xE1 preenchidos.\n  - info:\n      name: User\n      type: folder\n      seq: 3\n    docs:\n      content: |-\n        Rotas usadas pelo usu\xE1rio autenticado dentro do LGPDetes Proxy.\n\n        Antes de usar esta pasta:\n        1. rode `auth/User Login`\n        2. defina `platformId`, `providerId` e, quando aplic\xE1vel, `clientSessionId`\n      type: text/markdown\n    items:\n      - info:\n          name: List Platforms\n          type: http\n          seq: 1\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/user/platforms'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n      - info:\n          name: List Providers\n          type: http\n          seq: 2\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/user/providers'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n      - info:\n          name: Create Consent\n          type: http\n          seq: 3\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/user/consent'\n          body:\n            type: json\n            data: |-\n              {\n                \"platformId\": \"{{platformId}}\",\n                \"providerId\": \"{{providerId}}\",\n                \"clientSessionId\": \"{{clientSessionId}}\",\n                \"approved\": true\n              }\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n      - info:\n          name: Start Verification\n          type: http\n          seq: 4\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/user/verify'\n          body:\n            type: json\n            data: |-\n              {\n                \"platformId\": \"{{platformId}}\",\n                \"providerId\": \"{{providerId}}\",\n                \"clientSessionId\": \"{{clientSessionId}}\"\n              }\n        runtime:\n          assertions:\n            - expression: $res.status\n              operator: '200'\n              value: ''\n          actions:\n            - type: set-variable\n              phase: after-response\n              selector:\n                expression: $res.body.verification.id\n                method: jsonq\n              variable:\n                name: verificationId\n                scope: runtime\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Inicia a verifica\xE7\xE3o para o usu\xE1rio autenticado.\n\n          Atualiza automaticamente `verificationId` com `verification.id`.\n      - info:\n          name: List Connections\n          type: http\n          seq: 5\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/user/connections'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n      - info:\n          name: Revoke Connection\n          type: http\n          seq: 6\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/user/connections/{{connectionId}}/revoke'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n  - info:\n      name: Verification\n      type: folder\n      seq: 4\n    docs:\n      content: |-\n        Ciclo interno da verifica\xE7\xE3o.\n\n        Em um fluxo completo:\n        1. `Start Verification Direct` ou `user/Start Verification`\n        2. `Provider Callback`\n        3. `Finalize Verification`\n\n        As rotas desta pasta ajudam a simular o callback do provedor e a emiss\xE3o do proof token.\n      type: text/markdown\n    items:\n      - info:\n          name: Start Verification Direct\n          type: http\n          seq: 1\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/verification/start'\n          body:\n            type: json\n            data: |-\n              {\n                \"platformId\": \"{{platformId}}\",\n                \"providerId\": \"{{providerId}}\",\n                \"clientSessionId\": \"{{clientSessionId}}\"\n              }\n        runtime:\n          assertions:\n            - expression: $res.status\n              operator: '200'\n              value: ''\n          actions:\n            - type: set-variable\n              phase: after-response\n              selector:\n                expression: $res.body.verification.id\n                method: jsonq\n              variable:\n                name: verificationId\n                scope: runtime\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Alternativa server-to-server para iniciar uma verifica\xE7\xE3o sem passar pela rota autenticada do usu\xE1rio.\n\n          Atualiza automaticamente `verificationId` com `verification.id`.\n      - info:\n          name: Get Verification Status\n          type: http\n          seq: 2\n        http:\n          method: GET\n          url: '{{baseUrl}}/api/verification/{{verificationId}}/status'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n      - info:\n          name: Provider Callback\n          type: http\n          seq: 3\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/verification/{{verificationId}}/callback/provider'\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n      - info:\n          name: Finalize Verification\n          type: http\n          seq: 4\n        http:\n          method: POST\n          url: '{{baseUrl}}/api/verification/{{verificationId}}/finalize'\n        runtime:\n          assertions:\n            - expression: $res.status\n              operator: '200'\n              value: ''\n          actions:\n            - type: set-variable\n              phase: after-response\n              selector:\n                expression: $res.body.verification.proofToken\n                method: jsonq\n              variable:\n                name: proofToken\n                scope: runtime\n        settings:\n          encodeUrl: true\n          timeout: 0\n          followRedirects: true\n          maxRedirects: 5\n        docs: |-\n          Finaliza a verifica\xE7\xE3o ap\xF3s o callback do provedor.\n\n          Em caso de sucesso, atualiza automaticamente `proofToken` com `verification.proofToken`.\nrequest:\n  headers:\n    - name: accept\n      value: application/json\n    - name: content-type\n      value: application/json\ndocs:\n  content: |-\n    # LGPDetes Proxy API\n\n    Cole\xE7\xE3o Bruno para todas as rotas em `app/api`.\n\n    ## Uso r\xE1pido\n\n    1. Inicie a aplica\xE7\xE3o em `http://localhost:3000`\n    2. Abra esta pasta como collection no Bruno\n    3. Selecione o ambiente `local`\n    4. Rode `auth/User Login` antes das rotas protegidas de usu\xE1rio\n    5. Rode `auth/Admin Login` antes das rotas protegidas de admin\n\n    ## Credenciais seed\n\n    - Usu\xE1rio: `joao.silva@northmail.com` / `DemoUser!23`\n    - Admin: `admin@lgpdetesproxy.com` / `DemoAdmin!23`\n\n    ## Vari\xE1veis que voc\xEA vai atualizar ao longo do fluxo\n\n    - `clientSessionId`\n    - `verificationId`\n    - `proofToken`\n    - `connectionId`\n\n    ## Fluxo externo completo\n\n    1. `client/Request Age Check`\n    2. `auth/User Login`\n    3. `user/Create Consent`\n    4. `user/Start Verification`\n    5. `verification/Provider Callback`\n    6. `verification/Finalize Verification`\n    7. `client/Exchange Proof`\n\n    ## Observa\xE7\xF5es\n\n    - O backend usa estado em mem\xF3ria. Reinicie o servidor para resetar o dataset.\n    - As rotas de logout respondem com `303` e redirecionam para as telas de login.\n    - As rotas protegidas dependem do cookie de sess\xE3o salvo pelo Bruno ap\xF3s login.\n  type: text/markdown\nbundled: true\nextensions:\n  bruno:\n    ignore:\n      - node_modules\n      - .git\n    exportedAt: '2026-04-14T16:32:07.908Z'\n    exportedUsing: Bruno/3.2.2\n";
        new window.OpenCollection({
            target: document.getElementById('opencollection-container'),
            opencollection: collectionData,
            theme: 'light'
        });
    </script>
</body>
